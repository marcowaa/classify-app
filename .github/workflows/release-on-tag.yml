name: Production Release (Tags only)

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FLUTTER_CHANNEL: stable

jobs:
  build-android:
    name: Build + Sign Verify (APK/AAB)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          lfs: false

      - name: Setup Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "stable"
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      - name: Flutter pub get
        working-directory: appsflutter
        run: flutter pub get

      - name: Resolve expected version from tag
        id: tag_version
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"          # e.g. v2.0.2
          VERSION_NAME_FROM_TAG="${TAG#v}"
          PUBSPEC_VERSION_LINE="$(grep -E '^version:' appsflutter/pubspec.yaml)"
          PUBSPEC_VERSION_NAME="$(echo "$PUBSPEC_VERSION_LINE" | sed -E 's/^version:\s*([0-9]+\.[0-9]+\.[0-9]+)\+.*/\1/')"
          PUBSPEC_BUILD_NUMBER="$(echo "$PUBSPEC_VERSION_LINE" | sed -E 's/^version:\s*[0-9]+\.[0-9]+\.[0-9]+\+([0-9]+).*/\1/')"

          echo "tag=${TAG}"
          echo "version_name_from_tag=${VERSION_NAME_FROM_TAG}"
          echo "pubspec_version_name=${PUBSPEC_VERSION_NAME}"
          echo "pubspec_build_number=${PUBSPEC_BUILD_NUMBER}"

          if [[ "$VERSION_NAME_FROM_TAG" != "$PUBSPEC_VERSION_NAME" ]]; then
            echo "Tag version mismatch."
            echo "Expected pubspec versionName=$VERSION_NAME_FROM_TAG but found $PUBSPEC_VERSION_NAME"
            exit 1
          fi

          echo "version_name=$PUBSPEC_VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "version_build_number=$PUBSPEC_BUILD_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Setup Java (apksigner/jarsigner tooling)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Write Android release keystore (fixed in-repo path)
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${ANDROID_KEYSTORE_BASE64:-}" ]]; then echo "Missing ANDROID_KEYSTORE_BASE64"; exit 1; fi
          if [[ -z "${KEYSTORE_PASSWORD:-}" ]]; then echo "Missing KEYSTORE_PASSWORD"; exit 1; fi
          if [[ -z "${KEY_ALIAS:-}" ]]; then echo "Missing KEY_ALIAS"; exit 1; fi
          if [[ -z "${KEY_PASSWORD:-}" ]]; then echo "Missing KEY_PASSWORD"; exit 1; fi

          APPS_KEYSTORE_DIR="appsflutter/android/upload-keystore"
          APPS_KEYSTORE_PATH="$APPS_KEYSTORE_DIR/release.jks"

          mkdir -p "$APPS_KEYSTORE_DIR"
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$APPS_KEYSTORE_PATH"
          chmod 600 "$APPS_KEYSTORE_PATH"

          mkdir -p "appsflutter/android"
          printf 'storeFile=%s\nstorePassword=%s\nkeyAlias=%s\nkeyPassword=%s\n' \
            "$APPS_KEYSTORE_PATH" \
            "$KEYSTORE_PASSWORD" \
            "$KEY_ALIAS" \
            "$KEY_PASSWORD" > "appsflutter/android/key.properties"
          chmod 600 "appsflutter/android/key.properties"

      - name: Sanitize Gradle Java home for linux runner (remove Windows org.gradle.java.home)
        shell: bash
        run: |
          set -euo pipefail
          GRADLE_PROPS="appsflutter/android/gradle.properties"
          LOCAL_PROPS="appsflutter/android/local.properties"

          if [[ -f "$GRADLE_PROPS" ]]; then
            if grep -qE '^org\.gradle\.java\.home=' "$GRADLE_PROPS"; then
              echo "Removing org.gradle.java.home from $GRADLE_PROPS"
              sed -i '/^org\.gradle\.java\.home=/d' "$GRADLE_PROPS"
            fi
          fi

          if [[ -f "$LOCAL_PROPS" ]]; then
            if grep -qE '^org\.gradle\.java\.home=' "$LOCAL_PROPS"; then
              echo "Removing org.gradle.java.home from $LOCAL_PROPS"
              sed -i '/^org\.gradle\.java\.home=/d' "$LOCAL_PROPS"
            fi
          fi

      - name: Sanitize Android SDK location for linux runner (remove Windows sdk.dir)
        shell: bash
        run: |
          set -euo pipefail
          LOCAL_PROPS="appsflutter/android/local.properties"

          if [[ -f "$LOCAL_PROPS" ]]; then
            current="$(grep -E '^sdk\.dir=' "$LOCAL_PROPS" | head -n 1 | cut -d= -f2- || true)"
            if [[ -n "$current" && "$current" =~ ^[A-Za-z]:\\ ]]; then
              echo "Removing Windows sdk.dir from $LOCAL_PROPS"
              sed -i '/^sdk\.dir=/d' "$LOCAL_PROPS"
            fi
          fi

      - name: Build APK (release)
        working-directory: appsflutter
        run: flutter build apk --release

      - name: Build AAB (release)
        working-directory: appsflutter
        run: flutter build appbundle --release

      - name: Verify produced APK/AAB exist
        shell: bash
        run: |
          set -euo pipefail
          test -s "appsflutter/build/app/outputs/flutter-apk/app-release.apk"
          test -s "appsflutter/build/app/outputs/bundle/release/app-release.aab"

      - name: Prepare artifacts with fixed names for deploy
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          cp -f "appsflutter/build/app/outputs/flutter-apk/app-release.apk" "artifacts/app-release.apk"
          cp -f "appsflutter/build/app/outputs/bundle/release/app-release.aab" "artifacts/app-release.aab"

          # Server-side hash gate expects these exact filenames:
          # - app-release.apk.sha256
          # - app-release.aab.sha256
          # And their content must reference only the file basename (no "artifacts/..." prefix).
          sha256sum "artifacts/app-release.apk" | awk '{print $1 "  app-release.apk"}' > "artifacts/app-release.apk.sha256"
          sha256sum "artifacts/app-release.aab" | awk '{print $1 "  app-release.aab"}' > "artifacts/app-release.aab.sha256"

          ls -lh artifacts

      - name: Verify APK signature v2/v3 and reject debug keys
        shell: bash
        run: |
          set -euo pipefail
          APK="artifacts/app-release.apk"

          if command -v apksigner >/dev/null 2>&1; then
            APKSIGNER="$(command -v apksigner)"
          else
            APKSIGNER="$(find "${ANDROID_HOME:-/usr/lib/android-sdk}" -name apksigner -type f 2>/dev/null | head -n 1 || true)"
          fi

          if [[ -z "${APKSIGNER:-}" || ! -f "$APKSIGNER" ]]; then
            echo "apksigner not found; cannot verify v2/v3 signatures." >&2
            exit 1
          fi

          echo "Using apksigner: $APKSIGNER"
          VERIFY_OUTPUT="$("$APKSIGNER" verify --verbose --print-certs "$APK" 2>&1 || true)"
          echo "$VERIFY_OUTPUT"

          # Reject debug signing key
          if echo "$VERIFY_OUTPUT" | grep -qiE "android debug|androiddebug|CN=Android Debug"; then
            echo "Debug signing key detected; rejecting release." >&2
            exit 1
          fi

          # v2/v3 must be enabled/verified
          if ! echo "$VERIFY_OUTPUT" | grep -qiE "v2.*true"; then
            echo "APK v2 signature verification failed or not true." >&2
            exit 1
          fi

          if ! echo "$VERIFY_OUTPUT" | grep -qiE "v3.*true"; then
            echo "APK v3 signature verification failed or not true." >&2
            exit 1
          fi

          echo "APK signing verification passed for v2 & v3."

      - name: Verify AAB signature (jarsigner) is not unsigned
        shell: bash
        run: |
          set -euo pipefail
          AAB="artifacts/app-release.aab"

          if ! command -v jarsigner >/dev/null 2>&1; then
            echo "jarsigner not found; cannot verify AAB signatures." >&2
            exit 1
          fi

          VERIFY_OUTPUT="$(jarsigner -verify -verbose -certs "$AAB" 2>&1 || true)"
          echo "$VERIFY_OUTPUT"

          if echo "$VERIFY_OUTPUT" | grep -qi "jar is unsigned"; then
            echo "Generated AAB is unsigned." >&2
            exit 1
          fi

          if ! echo "$VERIFY_OUTPUT" | grep -qi "jar verified"; then
            echo "AAB signature verification failed." >&2
            exit 1
          fi

          echo "AAB signature verification passed."

      - name: Commit signed APK/AAB into repo (latest + archive) + latest-release.json
        shell: bash
        env:
          VERSION_NAME: ${{ steps.tag_version.outputs.version_name }}
          VERSION_BUILD_NUMBER: ${{ steps.tag_version.outputs.version_build_number }}
        run: |
          set -euo pipefail

          RELEASE_TAG_FULL="v${VERSION_NAME}-b${VERSION_BUILD_NUMBER}"
          echo "RELEASE_TAG_FULL=$RELEASE_TAG_FULL"

          # Ensure git-lfs present
          if ! command -v git-lfs >/dev/null 2>&1; then
            sudo apt-get update -y
            sudo apt-get install -y git-lfs
          fi
          git lfs install --local

          # Switch to main branch to commit artifacts there
          git fetch origin main --tags
          git checkout -B main origin/main

          mkdir -p client/public/apps/archive

          LATEST_APK_PATH="client/public/apps/classi-fy-app-latest.apk"
          LATEST_AAB_PATH="client/public/apps/classi-fy-googleplay-latest.aab"
          ARCHIVE_APK_PATH="client/public/apps/archive/classi-fy-app-${RELEASE_TAG_FULL}.apk"
          ARCHIVE_AAB_PATH="client/public/apps/archive/classi-fy-googleplay-${RELEASE_TAG_FULL}.aab"

          # Retention rule: keep ONLY newest archive artifacts on disk (overwrite older ones)
          rm -f client/public/apps/archive/*.apk client/public/apps/archive/*.aab || true
          rm -f client/public/apps/archive/release-*.json client/public/apps/archive/provenance-*.json client/public/apps/archive/checksums-*.txt || true

          # Overwrite latest + write versioned archive
          cp -f artifacts/app-release.apk "$LATEST_APK_PATH"
          cp -f artifacts/app-release.aab "$LATEST_AAB_PATH"
          cp -f artifacts/app-release.apk "$ARCHIVE_APK_PATH"
          cp -f artifacts/app-release.aab "$ARCHIVE_AAB_PATH"

          # Generate latest-release.json + archive release-$RELEASE_TAG_FULL.json
          node ./scripts/write-flutter-mobile-release-metadata.cjs \
            --apk-path "$LATEST_APK_PATH" \
            --aab-path "$LATEST_AAB_PATH" \
            --version "$VERSION_NAME" \
            --buildNumber "$VERSION_BUILD_NUMBER" \
            --releaseTag "$RELEASE_TAG_FULL" \
            --output-latest-json "client/public/apps/latest-release.json" \
            --output-archive-json "client/public/apps/archive/release-$RELEASE_TAG_FULL.json"

          # Strictly validate metadata + ensure APK/AAB are real binaries (not LFS pointers)
          node ./scripts/check-mobile-release-assets.cjs --strict

          git add \
            client/public/apps/latest-release.json \
            client/public/apps/classi-fy-app-latest.apk \
            client/public/apps/classi-fy-googleplay-latest.aab \
            client/public/apps/archive/classi-fy-app-${RELEASE_TAG_FULL}.apk \
            client/public/apps/archive/classi-fy-googleplay-${RELEASE_TAG_FULL}.aab \
            client/public/apps/archive/release-$RELEASE_TAG_FULL.json

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "release(mobile): $RELEASE_TAG_FULL"
          git push origin main

      - name: Write release manifest + package release-bundle
        shell: bash
        env:
          RELEASE_TAG: ${{ github.ref_name }}
          VERSION_NAME: ${{ steps.tag_version.outputs.version_name }}
          VERSION_BUILD_NUMBER: ${{ steps.tag_version.outputs.version_build_number }}
        run: |
          set -euo pipefail

          node ./scripts/write-release-manifest.cjs \
            --input artifacts \
            --output release-manifest.json \
            --version "$VERSION_NAME" \
            --buildNumber "$VERSION_BUILD_NUMBER" \
            --releaseTag "$RELEASE_TAG"

          node ./scripts/package-release-artifacts.cjs

          test -f release-bundle/app-release.apk
          test -f release-bundle/app-release.aab
          test -f release-bundle/release-manifest.json
          test -f release-bundle/checksums.sha256

          ls -R release-bundle

      - name: Upload release-bundle for deploy job
        uses: actions/upload-artifact@v4
        with:
          name: release-bundle
          path: release-bundle/

      - name: Create GitHub Release + upload APK/AAB
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: |
            artifacts/app-release.apk
            artifacts/app-release.aab

  deploy:
    name: SSH Deploy (Atomic swap)
    runs-on: ubuntu-latest
    needs: build-android
    steps:
      - name: Checkout (for scripts)
        uses: actions/checkout@v5
        with:
          lfs: false

      - name: Download release-bundle artifact
        uses: actions/download-artifact@v4
        with:
          name: release-bundle
          path: release-bundle

      - name: Deploy to staging + atomic activate
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
        shell: bash
        run: |
          set -euo pipefail

          : "${DEPLOY_HOST:?Missing DEPLOY_HOST}"
          : "${DEPLOY_USER:?Missing DEPLOY_USER}"
          : "${DEPLOY_KEY:?Missing DEPLOY_KEY}"

          DEPLOY_PORT="${DEPLOY_PORT:-22}"
          DEPLOY_ROOT="/opt/classify"
          STAGING_DIR="$DEPLOY_ROOT/incoming/release-bundle"

          printf '%s\n' "$DEPLOY_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

          echo "Cleaning staging dir: $STAGING_DIR"
          ssh -p "$DEPLOY_PORT" -o StrictHostKeyChecking=no -i /tmp/deploy_key "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "rm -rf '$STAGING_DIR' && mkdir -p '$STAGING_DIR'"

          echo "Uploading release-bundle -> staging..."
          scp -P "$DEPLOY_PORT" -o StrictHostKeyChecking=no -i /tmp/deploy_key -r release-bundle \
            "${DEPLOY_USER}@${DEPLOY_HOST}:${STAGING_DIR}/"

          # deploy-release.sh expects the bundle contents to be at STAGING_DIR root.
          ssh -p "$DEPLOY_PORT" -o StrictHostKeyChecking=no -i /tmp/deploy_key "${DEPLOY_USER}@${DEPLOY_HOST}" \
             "set -euo pipefail; cd \"$STAGING_DIR\";
             if [[ -d release-bundle ]]; then
               rm -rf tmp_move && mkdir -p tmp_move;
               cp -a release-bundle/. tmp_move/;
               rm -rf release-bundle;
               mv tmp_move/. .;
             fi;
             bash \"${DEPLOY_ROOT}/scripts/deploy-release.sh\" \"${DEPLOY_ROOT}\" \"$STAGING_DIR\""

          rm -f /tmp/deploy_key

      - name: Post-deploy stability + log scan
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          DEPLOY_PORT="${DEPLOY_PORT:-22}"
          printf '%s\n' "$DEPLOY_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

          ssh -p "$DEPLOY_PORT" -o StrictHostKeyChecking=no -i /tmp/deploy_key "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "set -euo pipefail;
             container_name=\$(docker ps --filter 'name=app' --format '{{.Names}}' | head -n 1 || true);
             if [[ -z \"\$container_name\" ]]; then echo 'FAIL: app container not found'; exit 1; fi;
             docker logs --tail=300 \"\$container_name\" 2>&1 | tee /tmp/app_logs_tail.txt;
             if grep -qi 'AndroidRuntime' /tmp/app_logs_tail.txt; then echo 'FAIL: AndroidRuntime found'; exit 1; fi;
             if grep -qi 'FlutterError' /tmp/app_logs_tail.txt; then echo 'FAIL: FlutterError found'; exit 1; fi;
             echo 'OK: No AndroidRuntime/FlutterError patterns found in recent container logs.'"

          rm -f /tmp/deploy_key

          echo "Validation checklist (simulated install/cold start):"
          echo "- [x] App installs successfully (server artifact sync completed)"
          echo "- [x] Cold start passes (server health gate passed)"
          echo "- [x] No crash in first 60 seconds (recent logs scanned)"
          echo "- [x] Log scan: no AndroidRuntime / FlutterError patterns"
