name: CI/CD Pipeline

on:
  workflow_dispatch:
    inputs:
      build_apk:
        description: "Build Android APK"
        required: false
        type: boolean
        default: true
      build_aab:
        description: "Build Android App Bundle"
        required: false
        type: boolean
        default: true
      build_web:
        description: "Build Web wrapper"
        required: false
        type: boolean
        default: true

permissions:
  contents: write
  actions: read
  checks: write

env:
  NODE_VERSION: "20"
  FLUTTER_VERSION: "3.41.0"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  RELEASE_CHANNEL: ${{ github.ref_type == 'tag' && 'release' || 'main' }}

jobs:
  verify:
    name: Verify Web App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          lfs: false

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: TypeScript Check
        run: npx tsc --noEmit

      - name: Unit Tests
        run: npm run test -- --runInBand

      - name: Critical Flow Tests
        run: npm run test:critical-flow

      - name: Production Build
        run: npm run build

      - name: Verify build artifacts
        run: |
          test -f dist/index.js
          test -d dist/public
          echo "Web build artifacts verified"

  version-bump:
    name: Bump Version
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' }}
    needs: verify
    outputs:
      app_version: ${{ steps.bump.outputs.app_version }}
      build_number: ${{ steps.bump.outputs.build_number }}
      release_tag: ${{ steps.bump.outputs.release_tag }}
    steps:
      - uses: actions/checkout@v5
        with:
          lfs: false
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Compute and persist version
        id: bump
        run: |
          set -euo pipefail
          node ./scripts/bump-release-version.cjs --write --json > /tmp/bump.json

          node ./scripts/write-bump-outputs.cjs /tmp/bump.json >> "$GITHUB_OUTPUT"

      - name: Commit version bump
        if: steps.bump.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json appsflutter/pubspec.yaml CHANGELOG.md release-manifest.json || true
          git commit -m "chore(release): bump version to ${{ steps.bump.outputs.app_version }}" || true
          git push origin HEAD:main || true

  flutter-mobile:
    name: Build Flutter Wrapper
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' }}
    needs: verify
    strategy:
      matrix:
        target: ${{ fromJSON(format('["{0}","{1}","{2}"]', inputs.build_apk && 'apk' || 'skip-apk', inputs.build_aab && 'appbundle' || 'skip-aab', inputs.build_web && 'web' || 'skip-web')) }}
    steps:
      - uses: actions/checkout@v5
        with:
          lfs: false

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Flutter pub get
        working-directory: appsflutter
        run: flutter pub get

      - name: Setup Java (for jarsigner/gradle signing tooling)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Sanitize Gradle/Android paths for Linux runner
        if: ${{ matrix.target == 'apk' || matrix.target == 'appbundle' }}
        shell: bash
        run: |
          set -euo pipefail
          GRADLE_PROPS="appsflutter/android/gradle.properties"
          LOCAL_PROPS="appsflutter/android/local.properties"

          is_windows_path() {
            local v="$1"
            [[ "$v" =~ ^[A-Za-z]:\\ ]] || [[ "$v" == *"\\"* ]]
          }

          # 1) Fix Gradle Java home (org.gradle.java.home) if it contains a Windows path
          if [[ -f "$GRADLE_PROPS" ]]; then
            if grep -qE '^org\.gradle\.java\.home=' "$GRADLE_PROPS"; then
              echo "Removing org.gradle.java.home from $GRADLE_PROPS"
              sed -i '/^org\.gradle\.java\.home=/d' "$GRADLE_PROPS"
            fi
          fi

          if [[ -f "$LOCAL_PROPS" ]]; then
            if grep -qE '^org\.gradle\.java\.home=' "$LOCAL_PROPS"; then
              echo "Removing org.gradle.java.home from $LOCAL_PROPS"
              sed -i '/^org\.gradle\.java\.home=/d' "$LOCAL_PROPS"
            fi
          fi

          # 2) Fix Android SDK location (sdk.dir) if it contains a Windows path
          if [[ -f "$LOCAL_PROPS" ]]; then
            local_sdk_dir=""
            local_sdk_dir="$(grep -E '^sdk\.dir=' "$LOCAL_PROPS" | head -n 1 | cut -d= -f2- || true)"
            if [ -n "$local_sdk_dir" ] && is_windows_path "$local_sdk_dir"; then
              echo "Removing Windows sdk.dir from $LOCAL_PROPS"
              sed -i '/^sdk\.dir=/d' "$LOCAL_PROPS"
            fi
          fi

      - name: Write Android release key.properties from secrets (fixed keystore path)
        if: ${{ matrix.target == 'apk' || matrix.target == 'appbundle' }}
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          set -euo pipefail

          if [ -z "${ANDROID_KEYSTORE_BASE64:-}" ]; then echo "Missing ANDROID_KEYSTORE_BASE64 secret"; exit 1; fi
          if [ -z "${KEYSTORE_PASSWORD:-}" ]; then echo "Missing KEYSTORE_PASSWORD secret"; exit 1; fi
          if [ -z "${KEY_ALIAS:-}" ]; then echo "Missing KEY_ALIAS secret"; exit 1; fi
          if [ -z "${KEY_PASSWORD:-}" ]; then echo "Missing KEY_PASSWORD secret"; exit 1; fi

          APPS_KEYSTORE_DIR="appsflutter/android/keystore"
          APPS_KEYSTORE_PATH_REL="$APPS_KEYSTORE_DIR/classify-release-2026.jks"
          APPS_KEYSTORE_PATH_ABS="$(pwd)/$APPS_KEYSTORE_PATH_REL"

          mkdir -p "$APPS_KEYSTORE_DIR"
          # Some secrets may contain CR/LF; strip them before decoding to avoid corrupt keystore
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | tr -d '\r\n' | base64 -d > "$APPS_KEYSTORE_PATH_REL"
          chmod 600 "$APPS_KEYSTORE_PATH_REL"

          # Fail fast if keystore/password/alias are inconsistent (validate KEY_PASSWORD by actually signing)
          # keytool -list may succeed even if -keypass is wrong, so we sign a tiny jar to force key decryption.
          if ! command -v jarsigner >/dev/null 2>&1; then
            echo "jarsigner not found; cannot validate signing credentials." >&2
            exit 1
          fi

          JAR_TEST_DIR="$(mktemp -d)"
          JAR_TEST_FILE="$JAR_TEST_DIR/hello.txt"
          JAR_TEST_JAR="$JAR_TEST_DIR/signcheck.jar"
          echo "ok" > "$JAR_TEST_FILE"
          jar cf "$JAR_TEST_JAR" -C "$JAR_TEST_DIR" hello.txt

          set +e
          jarsigner_out="$(jarsigner -keystore "$APPS_KEYSTORE_PATH_ABS" \
            -storepass "$KEYSTORE_PASSWORD" \
            -keypass "$KEY_PASSWORD" \
            "$JAR_TEST_JAR" "$KEY_ALIAS" 2>&1)"
          jarsigner_rc=$?
          set -e

          echo "$jarsigner_out"
          if [ "$jarsigner_rc" -ne 0 ]; then
            echo "Keystore sanity check failed: jarsigner signing test rc=$jarsigner_rc" >&2
            exit "$jarsigner_rc"
          fi

          set +e
          verify_out="$(jarsigner -verify "$JAR_TEST_JAR" 2>&1)"
          verify_rc=$?
          set -e

          echo "$verify_out"
          if [ "$verify_rc" -ne 0 ]; then
            echo "Keystore sanity check failed: jarsigner verify rc=$verify_rc" >&2
            exit "$verify_rc"
          fi

          echo "Keystore sanity check passed (jarsigner validated KEY_PASSWORD)"

          mkdir -p "appsflutter/android"
          printf 'storeFile=%s\nstorePassword=%s\nkeyAlias=%s\nkeyPassword=%s\n' \
            "$APPS_KEYSTORE_PATH_ABS" \
            "$KEYSTORE_PASSWORD" \
            "$KEY_ALIAS" \
            "$KEY_PASSWORD" > "appsflutter/android/key.properties"
          chmod 600 "appsflutter/android/key.properties"

      - name: Resolve version metadata
        working-directory: appsflutter
        run: flutter build --help > /dev/null

      - name: Prepare Web SDK (enable + precache)
        if: matrix.target == 'web'
        working-directory: appsflutter
        run: |
          flutter config --enable-web
          flutter precache --web

      - name: Flutter Doctor (web)
        if: matrix.target == 'web'
        working-directory: appsflutter
        run: flutter doctor -v

      - name: Configure Flutter Web (create web platform if missing)
        if: matrix.target == 'web'
        working-directory: appsflutter
        run: |
          set -euo pipefail
          if [ ! -f "web/index.html" ]; then
            flutter create . --platforms web
          else
            echo "Web platform already configured"
          fi

      - name: Build APK
        if: matrix.target == 'apk'
        working-directory: appsflutter
        run: flutter build apk --release

      - name: Verify produced APK exists and is non-empty
        if: matrix.target == 'apk'
        working-directory: appsflutter
        run: |
          set -euo pipefail
          test -s "build/app/outputs/flutter-apk/app-release.apk"
          echo "APK verified: build/app/outputs/flutter-apk/app-release.apk"

      - name: Verify APK signature v2/v3 and reject debug keys
        if: matrix.target == 'apk'
        shell: bash
        working-directory: appsflutter
        run: |
          set -euo pipefail
          APK="build/app/outputs/flutter-apk/app-release.apk"

          if command -v apksigner >/dev/null 2>&1; then
            APKSIGNER="$(command -v apksigner)"
          else
            APKSIGNER="$(find "${ANDROID_HOME:-/usr/lib/android-sdk}" -name apksigner -type f 2>/dev/null | head -n 1 || true)"
          fi

          if [[ -z "${APKSIGNER:-}" || ! -f "$APKSIGNER" ]]; then
            echo "apksigner not found; cannot verify v2/v3 signatures." >&2
            exit 1
          fi

          echo "Using apksigner: $APKSIGNER"
          VERIFY_OUTPUT="$("$APKSIGNER" verify --verbose --print-certs "$APK" 2>&1 || true)"
          echo "$VERIFY_OUTPUT"

          # Reject debug signing key
          if echo "$VERIFY_OUTPUT" | grep -qiE "android debug|androiddebug|CN=Android Debug"; then
            echo "Debug signing key detected; rejecting release." >&2
            exit 1
          fi

          # v2/v3 must be enabled/verified
          if ! echo "$VERIFY_OUTPUT" | grep -qiE "v2.*true"; then
            echo "APK v2 signature verification failed or not true." >&2
            exit 1
          fi

          if ! echo "$VERIFY_OUTPUT" | grep -qiE "v3.*true"; then
            echo "APK v3 signature verification failed or not true." >&2
            exit 1
          fi

          echo "APK signing verification passed for v2 & v3."

      - name: Build App Bundle
        if: matrix.target == 'appbundle'
        working-directory: appsflutter
        run: flutter build appbundle --release

      - name: Verify produced AAB exists and is non-empty
        if: matrix.target == 'appbundle'
        working-directory: appsflutter
        run: |
          set -euo pipefail
          test -s "build/app/outputs/bundle/release/app-release.aab"
          echo "AAB verified: build/app/outputs/bundle/release/app-release.aab"

      - name: Verify AAB signature (jarsigner)
        if: matrix.target == 'appbundle'
        working-directory: appsflutter
        run: |
          set -euo pipefail
          AAB_PATH="build/app/outputs/bundle/release/app-release.aab"
          if ! command -v jarsigner >/dev/null 2>&1; then
            echo "jarsigner not found in PATH" >&2
            exit 1
          fi
          verify_output="$(jarsigner -verify -verbose -certs "$AAB_PATH" 2>&1 || true)"
          echo "$verify_output"
          if echo "$verify_output" | grep -qi "jar is unsigned"; then
            echo "Generated AAB is unsigned" >&2
            exit 1
          fi
          if ! echo "$verify_output" | grep -qi "jar verified"; then
            echo "AAB signature verification failed" >&2
            exit 1
          fi
          echo "AAB signature verification passed"

      - name: Build Web Wrapper
        if: matrix.target == 'web'
        working-directory: appsflutter
        run: flutter build web --release --verbose

      - name: Upload Android APK artifact
        if: matrix.target == 'apk'
        uses: actions/upload-artifact@v4
        with:
          name: flutter-apk
          path: appsflutter/build/app/outputs/flutter-apk/app-release.apk

      - name: Upload Android App Bundle artifact
        if: matrix.target == 'appbundle'
        uses: actions/upload-artifact@v4
        with:
          name: flutter-aab
          path: appsflutter/build/app/outputs/bundle/release/app-release.aab

      - name: Upload Web artifact
        if: matrix.target == 'web'
        uses: actions/upload-artifact@v4
        with:
          name: flutter-web
          path: appsflutter/build/web

  deploy:
    name: Atomic Deploy
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' }}
    needs: [verify, version-bump, flutter-mobile]
    environment:
      name: production
    steps:
      - uses: actions/checkout@v5
        with:
          lfs: false

      - name: Download deploy package
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Stage mobile artifacts with fixed names for Atomic Deploy
        run: |
          set -euo pipefail

          APK_SRC="$(find artifacts -type f -name 'app-release.apk' | head -n 1 || true)"
          AAB_SRC="$(find artifacts -type f -name 'app-release.aab' | head -n 1 || true)"

          if [ -z "${APK_SRC:-}" ]; then echo "Missing produced APK: app-release.apk"; exit 1; fi
          if [ -z "${AAB_SRC:-}" ]; then echo "Missing produced AAB: app-release.aab"; exit 1; fi

          cp -f "$APK_SRC" "artifacts/app-release.apk"
          cp -f "$AAB_SRC" "artifacts/app-release.aab"

      - name: Publish mobile artifacts metadata
        run: node ./scripts/write-release-manifest.cjs --input artifacts --output release-manifest.json --version '${{ needs.version-bump.outputs.app_version }}' --buildNumber '${{ needs.version-bump.outputs.build_number }}' --releaseTag '${{ needs.version-bump.outputs.release_tag }}'

      - name: Package release manifest
        run: node ./scripts/package-release-artifacts.cjs

      - name: Upload release bundle
        uses: actions/upload-artifact@v4
        with:
          name: release-bundle
          path: release-bundle/

      - name: Deploy to server
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
          RELEASE_VERSION: ${{ needs.version-bump.outputs.app_version }}
          RELEASE_BUILD_NUMBER: ${{ needs.version-bump.outputs.build_number }}
          RELEASE_TAG: ${{ needs.version-bump.outputs.release_tag }}
        run: |
          set -euo pipefail

          missing=()
          [[ -z "${DEPLOY_HOST:-}" ]] && missing+=("DEPLOY_HOST")
          [[ -z "${DEPLOY_USER:-}" ]] && missing+=("DEPLOY_USER")
          [[ -z "${DEPLOY_PATH:-}" ]] && missing+=("DEPLOY_PATH")
          [[ -z "${DEPLOY_KEY:-}" ]] && missing+=("DEPLOY_KEY")

          if [[ "${#missing[@]}" -gt 0 ]]; then
            echo "ERROR: Missing/empty secrets required for Atomic Deploy: ${missing[*]}"
            echo "Check GitHub repository Settings -> Secrets and Variables -> Actions."
            exit 1
          fi

          echo "=== Atomic Deploy connectivity diagnostics ==="
          echo "DEPLOY_HOST=$DEPLOY_HOST"
          echo "DEPLOY_PORT=${DEPLOY_PORT:-22}"
          echo "DEPLOY_USER=$DEPLOY_USER"

          echo "DNS A/AAAA (if available):"
          (getent ahosts "$DEPLOY_HOST" || true)

          # Resolve explicit IPv4 to avoid cases where DNS returns only IPv6 / unreachable first.
          DEPLOY_HOST_IP="$(getent ahosts "$DEPLOY_HOST" 2>/dev/null | awk '{print $1}' | grep -E '^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$' | head -n 1 || true)"
          DEPLOY_TARGET="${DEPLOY_HOST_IP:-$DEPLOY_HOST}"

          echo "Using deploy target: ${DEPLOY_TARGET}"

          echo "TCP reachability test (IPv4 only):"
          nc -4 -vz -w 5 "$DEPLOY_TARGET" "${DEPLOY_PORT:-22}" || true

          printf '%s\n' "$DEPLOY_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

          # Upload updated deploy script to ensure VPS runs the latest logic.
          scp -4 \
            -o AddressFamily=inet \
            -o ConnectTimeout=15 \
            -i /tmp/deploy_key \
            -P "${DEPLOY_PORT:-22}" \
            -o StrictHostKeyChecking=no \
            scripts/deploy-release.sh "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/scripts/deploy-release.sh"

          # Upload release bundle
          scp -4 \
            -o AddressFamily=inet \
            -o ConnectTimeout=15 \
            -i /tmp/deploy_key \
            -P "${DEPLOY_PORT:-22}" \
            -o StrictHostKeyChecking=no \
            -r release-bundle "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/incoming"

          ssh -4 \
            -o AddressFamily=inet \
            -o ConnectTimeout=15 \
            -i /tmp/deploy_key \
            -p "${DEPLOY_PORT:-22}" \
            -o StrictHostKeyChecking=no \
            "${DEPLOY_USER}@${DEPLOY_HOST}" "RELEASE_VERSION='${RELEASE_VERSION}' RELEASE_BUILD_NUMBER='${RELEASE_BUILD_NUMBER}' RELEASE_TAG='${RELEASE_TAG}' bash ${DEPLOY_PATH}/scripts/deploy-release.sh ${DEPLOY_PATH}"

          rm -f /tmp/deploy_key

  deploy-mobile:
    name: Deploy Mobile Artifacts
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' }}
    needs: [verify, flutter-mobile, version-bump]
    steps:
      - uses: actions/checkout@v5
        with:
          lfs: false

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish mobile artifacts metadata
        run: node ./scripts/write-release-manifest.cjs --input artifacts --output release-manifest.json --version '${{ needs.version-bump.outputs.app_version }}' --buildNumber '${{ needs.version-bump.outputs.build_number }}' --releaseTag '${{ needs.version-bump.outputs.release_tag }}'

      - name: Attach release note
        run: |
          echo "Release ready: ${{ github.ref_name }}"
