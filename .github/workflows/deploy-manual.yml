name: Manual Mobile Artifacts Refresh

on:
    workflow_dispatch:
        inputs:
            release_version:
                description: "Release version to deploy (used for logging only)"
                required: true
                type: string
            release_build_number:
                description: "Release build number (used for logging only)"
                required: true
                type: string
            deploy_root:
                description: "Server deploy root path"
                required: false
                type: string
                default: /opt/classify

permissions:
    contents: read
    actions: read

jobs:
    deploy:
        name: Refresh Mobile Artifacts on Server
        runs-on: ubuntu-latest
        environment:
            name: production
        steps:
            - name: Deploy mobile artifacts via SSH
              env:
                  DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
                  DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
                  DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
                  DEPLOY_PATH: ${{ inputs.deploy_root }}
                  DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
                  RELEASE_VERSION: ${{ inputs.release_version }}
                  RELEASE_BUILD_NUMBER: ${{ inputs.release_build_number }}
              run: |
                  set -euo pipefail
                  printf '%s\n' "$DEPLOY_KEY" > /tmp/deploy_key
                  chmod 600 /tmp/deploy_key

                  ssh -i /tmp/deploy_key -p "${DEPLOY_PORT:-22}" -o StrictHostKeyChecking=no "${DEPLOY_USER}@${DEPLOY_HOST}" \
                    "export RELEASE_VERSION='${RELEASE_VERSION}' RELEASE_BUILD_NUMBER='${RELEASE_BUILD_NUMBER}'; \
                     cd '${DEPLOY_PATH}' && \
                     chmod +x ./scripts/refresh-mobile-artifacts.sh && \
                     ./scripts/refresh-mobile-artifacts.sh \
                       --project-dir '${DEPLOY_PATH}' \
                       --branch main \
                       --compose-project-name classify_main \
                       --skip-admin-setup"

                  rm -f /tmp/deploy_key

    rollback:
        name: Rollback not supported (mobile artifacts refresh is not transactional)
        runs-on: ubuntu-latest
        environment:
            name: production
        steps:
            - run: echo "Rollback skipped."
