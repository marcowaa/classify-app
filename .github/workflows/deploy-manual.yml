name: Manual Deploy

on:
    workflow_dispatch:
        inputs:
            release_version:
                description: "Release version to deploy"
                required: true
                type: string
            release_build_number:
                description: "Release build number"
                required: true
                type: string
            deploy_root:
                description: "Server deploy root path"
                required: false
                type: string
                default: /srv/classify

permissions:
    contents: read
    actions: read

jobs:
    deploy:
        name: Atomic Deploy
        runs-on: ubuntu-latest
        environment:
            name: production
        steps:
            - uses: actions/download-artifact@v4
              with:
                  name: release-bundle
                  path: release-bundle

            - uses: actions/checkout@v5
              with:
                  lfs: false

            - name: Package release manifest
              run: node ./scripts/package-release-artifacts.cjs

            - name: Deploy to server
              env:
                  DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
                  DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
                  DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
                  DEPLOY_PATH: ${{ inputs.deploy_root }}
                  DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
                  RELEASE_VERSION: ${{ inputs.release_version }}
                  RELEASE_BUILD_NUMBER: ${{ inputs.release_build_number }}
              run: |
                  printf '%s\n' "$DEPLOY_KEY" > /tmp/deploy_key
                  chmod 600 /tmp/deploy_key
                  scp -i /tmp/deploy_key -P "${DEPLOY_PORT:-22}" -o StrictHostKeyChecking=no -r release-bundle "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/incoming"
                  ssh -i /tmp/deploy_key -p "${DEPLOY_PORT:-22}" -o StrictHostKeyChecking=no "${DEPLOY_USER}@${DEPLOY_HOST}" "RELEASE_VERSION='${RELEASE_VERSION}' RELEASE_BUILD_NUMBER='${RELEASE_BUILD_NUMBER}' ${DEPLOY_PATH}/scripts/deploy-release.sh ${DEPLOY_PATH}/incoming/release-bundle"
                  rm -f /tmp/deploy_key

    rollback:
        name: Rollback Release
        runs-on: ubuntu-latest
        environment:
            name: production
        steps:
            - uses: actions/checkout@v5
              with:
                  lfs: false

            - name: Rollback on server
              env:
                  DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
                  DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
                  DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
                  DEPLOY_PATH: ${{ inputs.deploy_root }}
                  DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
              run: |
                  printf '%s\n' "$DEPLOY_KEY" > /tmp/deploy_key
                  chmod 600 /tmp/deploy_key
                  ssh -i /tmp/deploy_key -p "${DEPLOY_PORT:-22}" -o StrictHostKeyChecking=no "${DEPLOY_USER}@${DEPLOY_HOST}" "${DEPLOY_PATH}/scripts/rollback-release.sh ${DEPLOY_PATH}"
                  rm -f /tmp/deploy_key
