name: Project Tests (Tests-only)

on:
    push:
        branches:
            - "**"
    pull_request: {}
    workflow_dispatch: {}

permissions:
    contents: read

env:
    NODE_VERSION: "20"

jobs:
    tests:
        name: TypeScript + Unit + Critical Flow
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v5
              with:
                  lfs: false

            - name: Setup Node
              uses: actions/setup-node@v5
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: npm

            - name: Install dependencies
              run: npm ci --legacy-peer-deps

            - name: TypeScript Check
              run: npx tsc --noEmit

            - name: Unit Tests
              run: npm run test -- --runInBand

            - name: Critical Flow Tests
              run: npm run test:critical-flow
