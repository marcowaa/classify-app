<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1024">
<title>Classify — Feature Graphic 1024×500</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1024px;
    height: 500px;
    overflow: hidden;
    font-family: 'Cairo', sans-serif;
    background: #0F0A1E;
  }
  .container {
    width: 1024px;
    height: 500px;
    position: relative;
    background: linear-gradient(135deg, #0F0A1E 0%, #1E1B4B 40%, #2D1B69 70%, #4C1D95 100%);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 80px;
    overflow: hidden;
  }
  /* Safe zone: avoid outer 15% = 154px each side, 75px top/bottom */
  /* Background decorations */
  .bg-circle-1 {
    position: absolute;
    width: 600px; height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(124,58,237,0.3) 0%, transparent 70%);
    top: -200px; left: -100px;
    pointer-events: none;
  }
  .bg-circle-2 {
    position: absolute;
    width: 400px; height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(76,208,128,0.15) 0%, transparent 70%);
    bottom: -150px; right: -50px;
    pointer-events: none;
  }
  .bg-dots {
    position: absolute; inset: 0;
    background-image: radial-gradient(circle, rgba(255,255,255,0.06) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }
  /* Left: Text content */
  .text-section {
    position: relative;
    z-index: 10;
    text-align: right;
    flex: 1;
  }
  .brand-tag {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(124,58,237,0.4);
    border: 1px solid rgba(124,58,237,0.6);
    border-radius: 20px;
    padding: 6px 16px;
    margin-bottom: 20px;
  }
  .brand-tag span {
    font-size: 14px;
    color: #C4B5FD;
    font-weight: 600;
    letter-spacing: 1px;
  }
  .brand-dot {
    width: 8px; height: 8px;
    background: #7C3AED;
    border-radius: 50%;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.6; transform: scale(1.3); }
  }
  .main-title {
    font-size: 64px;
    font-weight: 900;
    line-height: 1.1;
    color: #FFFFFF;
    margin-bottom: 12px;
    text-shadow: 0 4px 20px rgba(0,0,0,0.3);
  }
  .main-title .highlight {
    background: linear-gradient(135deg, #7C3AED, #4CD080);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .sub-title {
    font-size: 20px;
    color: #C4B5FD;
    font-weight: 600;
    margin-bottom: 28px;
    line-height: 1.5;
  }
  .features-row {
    display: flex;
    gap: 12px;
    justify-content: flex-end;
    flex-wrap: wrap;
  }
  .feature-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 20px;
    padding: 6px 14px;
  }
  .feature-pill span {
    font-size: 13px;
    color: #E2E8F0;
    font-weight: 600;
  }
  /* Right: Tree visual */
  .tree-section {
    position: relative;
    z-index: 10;
    width: 280px;
    height: 380px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .tree-glow {
    position: absolute;
    width: 260px; height: 260px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(76,208,128,0.25) 0%, rgba(124,58,237,0.1) 60%, transparent 80%);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
  }
  .tree-svg {
    position: relative;
    z-index: 2;
  }
  /* App icon top left */
  .app-icon {
    position: absolute;
    top: 30px;
    right: 80px;
    display: flex;
    align-items: center;
    gap: 12px;
    z-index: 10;
  }
  .icon-box {
    width: 52px; height: 52px;
    background: linear-gradient(135deg, #7C3AED, #5B21B6);
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 8px 24px rgba(124,58,237,0.5);
  }
  .icon-text {
    font-size: 22px;
    font-weight: 900;
    color: white;
  }
  .app-name-label {
    font-size: 20px;
    font-weight: 800;
    color: #FFFFFF;
  }
</style>
</head>
<body>
<div class="container">
  <div class="bg-circle-1"></div>
  <div class="bg-circle-2"></div>
  <div class="bg-dots"></div>

  <!-- App Icon top right (RTL) -->
  <div class="app-icon">
    <div class="icon-box"><span class="icon-text">C</span></div>
    <span class="app-name-label">Classify</span>
  </div>

  <!-- Tree Visual (left in RTL = right visually) -->
  <div class="tree-section">
    <div class="tree-glow"></div>
    <svg class="tree-svg" width="220" height="340" viewBox="0 0 220 340" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- Trunk -->
      <rect x="100" y="260" width="20" height="70" rx="10" fill="#6B3E1A" opacity="0.9"/>
      <rect x="104" y="260" width="8" height="70" rx="4" fill="#8B5E3C" opacity="0.5"/>
      <!-- Roots -->
      <path d="M110 330 Q80 340 60 335" stroke="#6B3E1A" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.7"/>
      <path d="M110 330 Q140 340 160 335" stroke="#6B3E1A" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.7"/>
      <!-- Main canopy layers -->
      <!-- Bottom layer - large -->
      <ellipse cx="110" cy="230" rx="85" ry="55" fill="#16A34A" opacity="0.85"/>
      <ellipse cx="110" cy="225" rx="80" ry="50" fill="#22C55E" opacity="0.9"/>
      <!-- Mid layer -->
      <ellipse cx="110" cy="175" rx="70" ry="48" fill="#16A34A" opacity="0.9"/>
      <ellipse cx="110" cy="168" rx="65" ry="44" fill="#4ADE80" opacity="0.85"/>
      <!-- Top layer -->
      <ellipse cx="110" cy="120" rx="55" ry="42" fill="#22C55E" opacity="0.9"/>
      <ellipse cx="110" cy="112" rx="50" ry="38" fill="#86EFAC" opacity="0.8"/>
      <!-- Tip -->
      <ellipse cx="110" cy="72" rx="32" ry="28" fill="#4CD080" opacity="0.95"/>
      <!-- Highlights -->
      <ellipse cx="90" cy="105" rx="18" ry="12" fill="#A7F3D0" opacity="0.4"/>
      <ellipse cx="85" cy="160" rx="22" ry="14" fill="#6EE7B7" opacity="0.3"/>
      <ellipse cx="88" cy="215" rx="25" ry="16" fill="#6EE7B7" opacity="0.25"/>
      <!-- Fruits/Stars on tree -->
      <circle cx="140" cy="140" r="8" fill="#F97316" opacity="0.9"/>
      <circle cx="75" cy="155" r="6" fill="#EC4899" opacity="0.9"/>
      <circle cx="155" cy="200" r="7" fill="#F59E0B" opacity="0.9"/>
      <circle cx="65" cy="210" r="5" fill="#EF4444" opacity="0.9"/>
      <circle cx="130" cy="90" r="6" fill="#F97316" opacity="0.9"/>
      <circle cx="85" cy="80" r="5" fill="#EC4899" opacity="0.9"/>
      <!-- Sparkles around tree -->
      <g opacity="0.9">
        <path d="M175 100 L178 106 L184 109 L178 112 L175 118 L172 112 L166 109 L172 106 Z" fill="#FCD34D"/>
        <path d="M38 150 L40 155 L45 157 L40 159 L38 164 L36 159 L31 157 L36 155 Z" fill="#A78BFA" opacity="0.8"/>
        <path d="M180 240 L182 244 L186 246 L182 248 L180 252 L178 248 L174 246 L178 244 Z" fill="#34D399" opacity="0.7"/>
      </g>
      <!-- Stage progress dots at bottom -->
      <g transform="translate(30, 318)">
        <text x="0" y="0" font-family="Cairo" font-size="9" fill="#9CA3AF" opacity="0.8">المرحلة</text>
        <text x="42" y="0" font-family="Cairo" font-size="9" fill="#4CD080" font-weight="bold">15</text>
        <text x="56" y="0" font-family="Cairo" font-size="9" fill="#6B7280" opacity="0.6">/20</text>
      </g>
      <!-- Stars below -->
      <g transform="translate(20, 312)">
        <text x="0" y="12" font-size="10" fill="#FCD34D">★★★★★</text>
      </g>
    </svg>
  </div>

  <!-- Text Section -->
  <div class="text-section">
    <div class="brand-tag">
      <div class="brand-dot"></div>
      <span>منصة تعليمية عربية #1</span>
    </div>
    <div class="main-title">
      علّم •<span class="highlight"> تابع</span><br>• حفّز
    </div>
    <div class="sub-title">
      رقابة أبوية كاملة · شجرة نمو · مكافآت
    </div>
    <div class="features-row">
      <div class="feature-pill"><span>🌳 شجرة النمو</span></div>
      <div class="feature-pill"><span>🎮 ألعاب تعليمية</span></div>
      <div class="feature-pill"><span>📚 سوق معلمين</span></div>
      <div class="feature-pill"><span>🔒 بدون إعلانات</span></div>
    </div>
  </div>
</div>
</body>
</html>
