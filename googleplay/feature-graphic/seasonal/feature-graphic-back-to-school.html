<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1024">
<title>Classify — Feature Graphic Back to School 1024×500</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1024px; height: 500px; overflow: hidden; font-family: 'Cairo', sans-serif; }
  .container {
    width: 1024px; height: 500px; position: relative; overflow: hidden;
    background: linear-gradient(135deg, #1E3A5F 0%, #1E40AF 35%, #1D4ED8 65%, #2563EB 100%);
    display: flex; align-items: center; justify-content: space-between; padding: 0 70px;
  }
  .glow1 { position: absolute; width: 500px; height: 300px; border-radius: 50%; background: radial-gradient(ellipse, rgba(96,165,250,0.25) 0%, transparent 70%); top: -80px; right: -50px; pointer-events: none; }
  .glow2 { position: absolute; width: 400px; height: 400px; border-radius: 50%; background: radial-gradient(circle, rgba(34,197,94,0.15) 0%, transparent 70%); bottom: -100px; left: -50px; pointer-events: none; }
  /* Floating elements */
  .floaters { position: absolute; inset: 0; pointer-events: none; }
  /* App brand */
  .app-brand { position: absolute; top: 24px; right: 70px; display: flex; align-items: center; gap: 10px; z-index: 10; }
  .app-icon-box { width: 48px; height: 48px; background: linear-gradient(135deg, #7C3AED, #5B21B6); border-radius: 13px; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 900; color: white; }
  .app-brand-name { font-size: 19px; font-weight: 900; color: white; }
  /* Text */
  .text-content { position: relative; z-index: 10; text-align: right; flex: 1; }
  .season-badge { display: inline-flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3); border-radius: 20px; padding: 6px 16px; margin-bottom: 16px; }
  .season-badge span { font-size: 15px; color: white; font-weight: 700; }
  .main-title { font-size: 58px; font-weight: 900; color: white; line-height: 1.15; margin-bottom: 10px; }
  .main-title .yellow { color: #FDE68A; }
  .sub-text { font-size: 19px; color: rgba(255,255,255,0.85); font-weight: 600; margin-bottom: 22px; line-height: 1.5; }
  .features-row { display: flex; gap: 10px; justify-content: flex-end; flex-wrap: wrap; }
  .fpill { display: flex; align-items: center; gap: 6px; background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2); border-radius: 18px; padding: 5px 14px; }
  .fpill span { font-size: 13px; color: white; font-weight: 600; }
  /* Visual */
  .visual-section { position: relative; z-index: 10; width: 280px; height: 420px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
</style>
</head>
<body>
<div class="container">
  <div class="glow1"></div>
  <div class="glow2"></div>

  <!-- Floating decorations -->
  <svg style="position:absolute;inset:0;pointer-events:none;z-index:3" width="1024" height="500">
    <!-- Books -->
    <rect x="40" y="60" width="50" height="65" rx="4" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
    <rect x="35" y="55" width="50" height="65" rx="4" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
    <line x1="40" y1="70" x2="85" y2="70" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
    <!-- Pencil -->
    <rect x="900" y="380" width="12" height="80" rx="3" fill="rgba(253,230,138,0.4)" stroke="rgba(253,230,138,0.6)" stroke-width="1.5" transform="rotate(-30 900 380)"/>
    <!-- Stars -->
    <path d="M100 380 L102 387 L109 389 L102 391 L100 398 L98 391 L91 389 L98 387 Z" fill="rgba(253,230,138,0.6)"/>
    <path d="M920 60 L922 66 L928 68 L922 70 L920 76 L918 70 L912 68 L918 66 Z" fill="rgba(255,255,255,0.5)"/>
    <path d="M60 300 L62 306 L68 308 L62 310 L60 316 L58 310 L52 308 L58 306 Z" fill="rgba(255,255,255,0.4)"/>
    <path d="M960 280 L962 286 L968 288 L962 290 L960 296 L958 290 L952 288 L958 286 Z" fill="rgba(253,230,138,0.5)"/>
  </svg>

  <div class="app-brand">
    <div class="app-icon-box">C</div>
    <span class="app-brand-name">Classify</span>
  </div>

  <!-- Tree visual with school elements -->
  <div class="visual-section">
    <svg width="240" height="400" viewBox="0 0 240 400" fill="none">
      <ellipse cx="120" cy="390" rx="100" ry="10" fill="rgba(0,0,0,0.2)"/>
      <rect x="110" y="300" width="18" height="85" rx="9" fill="#6B3E1A" opacity="0.9"/>
      <path d="M110 295 Q75 310 55 302" stroke="#6B3E1A" stroke-width="8" stroke-linecap="round" fill="none" opacity="0.6"/>
      <path d="M128 295 Q163 310 183 302" stroke="#6B3E1A" stroke-width="8" stroke-linecap="round" fill="none" opacity="0.6"/>
      <ellipse cx="119" cy="272" rx="80" ry="50" fill="#14532D" opacity="0.7"/>
      <ellipse cx="119" cy="260" rx="76" ry="46" fill="#16A34A" opacity="0.88"/>
      <ellipse cx="119" cy="245" rx="70" ry="42" fill="#22C55E"/>
      <ellipse cx="119" cy="198" rx="62" ry="42" fill="#15803D" opacity="0.9"/>
      <ellipse cx="119" cy="185" rx="57" ry="38" fill="#22C55E" opacity="0.9"/>
      <ellipse cx="119" cy="170" rx="52" ry="34" fill="#4ADE80"/>
      <ellipse cx="119" cy="128" rx="44" ry="36" fill="#22C55E" opacity="0.95"/>
      <ellipse cx="119" cy="115" rx="40" ry="32" fill="#4ADE80" opacity="0.9"/>
      <ellipse cx="119" cy="100" rx="34" ry="28" fill="#86EFAC"/>
      <ellipse cx="119" cy="62" rx="26" ry="22" fill="#4CD080" opacity="0.95"/>
      <ellipse cx="119" cy="50" rx="18" ry="15" fill="#A7F3D0" opacity="0.9"/>
      <path d="M119 10 L122 19 L132 20 L125 27 L127 37 L119 32 L111 37 L113 27 L106 20 L116 19 Z" fill="#FDE68A" opacity="0.98"/>
      <!-- Books as fruits -->
      <rect x="152" y="170" width="18" height="22" rx="2" fill="#EF4444" opacity="0.85"/>
      <rect x="72" y="178" width="18" height="22" rx="2" fill="#3B82F6" opacity="0.85"/>
      <rect x="158" y="218" width="18" height="22" rx="2" fill="#F59E0B" opacity="0.85"/>
      <rect x="62" y="226" width="18" height="22" rx="2" fill="#10B981" opacity="0.85"/>
      <rect x="152" y="120" width="15" height="18" rx="2" fill="#8B5CF6" opacity="0.85"/>
      <!-- Pencil on tree -->
      <rect x="136" y="90" width="8" height="24" rx="2" fill="rgba(253,230,138,0.8)" transform="rotate(15 140 100)"/>
      <!-- Sparkles -->
      <path d="M190 82 L193 90 L201 93 L193 96 L190 104 L187 96 L179 93 L187 90 Z" fill="#FDE68A" opacity="0.8"/>
      <path d="M46 108 L48 115 L55 118 L48 121 L46 128 L44 121 L37 118 L44 115 Z" fill="rgba(255,255,255,0.6)"/>
    </svg>
  </div>

  <div class="text-content">
    <div class="season-badge">
      <span>🎒 العودة للمدرسة 2026</span>
    </div>
    <div class="main-title">
      ابدأ العام<br>بـ <span class="yellow">بداية صحيحة</span>
    </div>
    <div class="sub-text">
      مهام + ألعاب + رقابة أبوية<br>كل ما يحتاجه طفلك هذا العام
    </div>
    <div class="features-row">
      <div class="fpill"><span>📚 مناهج معتمدة</span></div>
      <div class="fpill"><span>🌳 شجرة النمو</span></div>
      <div class="fpill"><span>🎮 ألعاب تعليمية</span></div>
      <div class="fpill"><span>👨‍👩‍👧 رقابة كاملة</span></div>
    </div>
  </div>
</div>
</body>
</html>
