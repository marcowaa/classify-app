<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Classify Icon — Variant C Tree Focus | 512×512</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 512px; height: 512px; overflow: hidden; }
  .icon {
    width: 512px; height: 512px;
    background: linear-gradient(160deg, #064E3B 0%, #065F46 30%, #047857 60%, #059669 100%);
    position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center;
  }
  .glow { position: absolute; width: 350px; height: 350px; border-radius: 50%; background: radial-gradient(circle, rgba(167,243,208,0.3) 0%, transparent 70%); top: 50%; left: 50%; transform: translate(-50%,-60%); }
  .ground { position: absolute; bottom: 0; left: 0; right: 0; height: 120px; background: linear-gradient(180deg, transparent, rgba(0,0,0,0.3)); }
  .content { position: relative; z-index: 10; display: flex; flex-direction: column; align-items: center; }
  .brand { position: absolute; bottom: 36px; left: 50%; transform: translateX(-50%); }
  .brand-text { font-family: 'Arial Black', sans-serif; font-size: 58px; font-weight: 900; color: white; letter-spacing: 3px; text-shadow: 0 4px 16px rgba(0,0,0,0.5); white-space: nowrap; }
</style>
</head>
<body>
<div class="icon">
  <div class="glow"></div>
  <div class="ground"></div>
