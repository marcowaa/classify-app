<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Phone 01 — Growth Tree | 1080×1920</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1920px; overflow: hidden; font-family: 'Cairo', sans-serif; background: #0A0618; }

  .screen {
    width: 1080px; height: 1920px;
    background: linear-gradient(180deg, #0A0618 0%, #130A2A 35%, #1A0E3A 65%, #0D1B2A 100%);
    position: relative; overflow: hidden; display: flex; flex-direction: column; align-items: center;
  }

  /* Ambient glows */
  .glow-top { position: absolute; width: 700px; height: 700px; border-radius: 50%; background: radial-gradient(circle, rgba(124,58,237,0.25) 0%, transparent 70%); top: -200px; left: 50%; transform: translateX(-50%); pointer-events: none; }
  .glow-mid { position: absolute; width: 500px; height: 500px; border-radius: 50%; background: radial-gradient(circle, rgba(76,208,128,0.2) 0%, transparent 70%); top: 600px; left: 50%; transform: translateX(-50%); pointer-events: none; }
  .glow-bottom { position: absolute; width: 400px; height: 400px; border-radius: 50%; background: radial-gradient(circle, rgba(124,58,237,0.15) 0%, transparent 70%); bottom: 100px; left: 50%; transform: translateX(-50%); pointer-events: none; }
  .star-bg { position: absolute; inset: 0; background-image: radial-gradient(circle, rgba(255,255,255,0.08) 1px, transparent 1px); background-size: 60px 60px; pointer-events: none; }

  /* Header */
  .header { position: relative; z-index: 10; width: 100%; padding: 80px 60px 30px; display: flex; justify-content: space-between; align-items: center; }
  .header-left { display: flex; align-items: center; gap: 16px; }
  .avatar { width: 72px; height: 72px; border-radius: 50%; background: linear-gradient(135deg, #7C3AED, #4CD080); display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: 900; color: white; border: 3px solid rgba(124,58,237,0.5); }
  .user-info .name { font-size: 28px; font-weight: 800; color: #FFFFFF; }
  .user-info .level { font-size: 20px; color: #A78BFA; font-weight: 600; }
  .header-right { text-align: left; }
  .points-badge { background: linear-gradient(135deg, #F59E0B, #F97316); border-radius: 24px; padding: 12px 24px; display: flex; align-items: center; gap: 8px; box-shadow: 0 4px 20px rgba(245,158,11,0.4); }
  .points-badge .pts { font-size: 32px; font-weight: 900; color: white; }
  .points-badge .pts-label { font-size: 16px; color: rgba(255,255,255,0.8); font-weight: 600; }

  /* Headline */
  .headline { position: relative; z-index: 10; text-align: center; padding: 20px 60px 10px; }
  .headline h1 { font-size: 56px; font-weight: 900; color: #FFFFFF; line-height: 1.2; }
  .headline h1 .green { color: #4CD080; }
  .headline p { font-size: 26px; color: #A78BFA; font-weight: 600; margin-top: 10px; }

  /* Stage progress bar */
  .stage-bar { position: relative; z-index: 10; width: 100%; padding: 20px 60px; }
  .stage-label { display: flex; justify-content: space-between; margin-bottom: 10px; }
  .stage-label span { font-size: 22px; font-weight: 700; color: #C4B5FD; }
  .stage-label .current { color: #4CD080; font-size: 26px; font-weight: 900; }
  .progress-track { height: 16px; background: rgba(255,255,255,0.1); border-radius: 8px; overflow: hidden; }
  .progress-fill { height: 100%; width: 75%; background: linear-gradient(90deg, #7C3AED, #4CD080); border-radius: 8px; position: relative; }
  .progress-fill::after { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent); animation: shimmer 2s infinite; }
  @keyframes shimmer { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
  .stage-dots { display: flex; justify-content: center; gap: 12px; margin-top: 16px; }
  .stage-dot { width: 18px; height: 18px; border-radius: 50%; background: rgba(255,255,255,0.1); }
  .stage-dot.done { background: #4CD080; box-shadow: 0 0 8px rgba(76,208,128,0.6); }
  .stage-dot.current { background: #7C3AED; box-shadow: 0 0 12px rgba(124,58,237,0.8); transform: scale(1.3); }

  /* Tree container */
  .tree-container { position: relative; z-index: 10; flex: 1; display: flex; align-items: center; justify-content: center; width: 100%; padding: 10px 0; }
  .tree-glow { position: absolute; width: 560px; height: 560px; border-radius: 50%; background: radial-gradient(circle, rgba(76,208,128,0.22) 0%, rgba(124,58,237,0.1) 55%, transparent 75%); top: 50%; left: 50%; transform: translate(-50%, -50%); }

  /* Stats row */
  .stats-row { position: relative; z-index: 10; width: 100%; padding: 20px 40px; display: flex; gap: 20px; }
  .stat-card { flex: 1; background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12); border-radius: 24px; padding: 24px 20px; text-align: center; }
  .stat-card .num { font-size: 40px; font-weight: 900; color: #FFFFFF; }
  .stat-card .lbl { font-size: 18px; color: #9CA3AF; font-weight: 600; margin-top: 4px; }
  .stat-card.green .num { color: #4CD080; }
  .stat-card.purple .num { color: #A78BFA; }
  .stat-card.orange .num { color: #F97316; }

  /* Bottom CTA */
  .bottom-section { position: relative; z-index: 10; width: 100%; padding: 20px 60px 60px; text-align: center; }
  .biome-badge { display: inline-flex; align-items: center; gap: 10px; background: rgba(76,208,128,0.15); border: 1px solid rgba(76,208,128,0.4); border-radius: 30px; padding: 14px 32px; margin-bottom: 20px; }
  .biome-badge span { font-size: 22px; color: #4CD080; font-weight: 700; }
  .water-btn { width: 100%; height: 90px; background: linear-gradient(135deg, #7C3AED, #5B21B6); border-radius: 28px; display: flex; align-items: center; justify-content: center; gap: 14px; box-shadow: 0 8px 32px rgba(124,58,237,0.5); }
  .water-btn span { font-size: 30px; font-weight: 800; color: white; }
</style>
</head>
<body>
<div class="screen">
  <div class="glow-top"></div>
  <div class="glow-mid"></div>
  <div class="glow-bottom"></div>
  <div class="star-bg"></div>

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <div class="avatar">ي</div>
      <div class="user-info">
        <div class="name">يوسف أحمد</div>
        <div class="level">⭐ المستوى 12 — بطل التعلم</div>
      </div>
    </div>
    <div class="header-right">
      <div class="points-badge">
        <span class="pts">2,450</span>
        <span class="pts-label">نقطة</span>
      </div>
    </div>
  </div>

  <!-- Headline -->
  <div class="headline">
    <h1>شاهد طفلك <span class="green">ينمو</span><br>مع كل مهمة 🌳</h1>
    <p>20 مرحلة من البذرة إلى الشجرة الأسطورية</p>
  </div>

  <!-- Stage Progress -->
  <div class="stage-bar">
    <div class="stage-label">
      <span>تقدم الشجرة</span>
      <span class="current">المرحلة 15 / 20</span>
    </div>
    <div class="progress-track"><div class="progress-fill"></div></div>
    <div class="stage-dots">
      <div class="stage-dot done"></div><div class="stage-dot done"></div><div class="stage-dot done"></div>
      <div class="stage-dot done"></div><div class="stage-dot done"></div><div class="stage-dot done"></div>
      <div class="stage-dot done"></div><div class="stage-dot done"></div><div class="stage-dot done"></div>
      <div class="stage-dot done"></div><div class="stage-dot done"></div><div class="stage-dot done"></div>
      <div class="stage-dot done"></div><div class="stage-dot done"></div><div class="stage-dot done"></div>
      <div class="stage-dot current"></div>
      <div class="stage-dot"></div><div class="stage-dot"></div><div class="stage-dot"></div><div class="stage-dot"></div>
    </div>
  </div>

  <!-- Tree SVG -->
  <div class="tree-container">
    <div class="tree-glow"></div>
    <svg width="600" height="700" viewBox="0 0 600 700" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- Ground shadow -->
      <ellipse cx="300" cy="675" rx="160" ry="20" fill="rgba(0,0,0,0.4)"/>
      <!-- Trunk -->
      <path d="M270 650 Q275 580 285 520 L315 520 Q325 580 330 650 Z" fill="#6B3E1A"/>
      <path d="M285 520 Q290 560 295 620 L305 620 Q305 560 310 520 Z" fill="#8B5E3C" opacity="0.5"/>
      <!-- Roots -->
      <path d="M285 640 Q240 660 200 652" stroke="#6B3E1A" stroke-width="10" stroke-linecap="round" fill="none" opacity="0.7"/>
      <path d="M315 640 Q360 660 400 652" stroke="#6B3E1A" stroke-width="10" stroke-linecap="round" fill="none" opacity="0.7"/>
      <path d="M300 648 Q295 668 285 672" stroke="#8B5E3C" stroke-width="8" stroke-linecap="round" fill="none" opacity="0.5"/>
      <!-- Big bottom foliage -->
      <ellipse cx="300" cy="470" rx="220" ry="130" fill="#14532D" opacity="0.8"/>
      <ellipse cx="300" cy="455" rx="210" ry="120" fill="#16A34A" opacity="0.85"/>
      <ellipse cx="300" cy="440" rx="195" ry="110" fill="#22C55E"/>
      <!-- Mid foliage -->
      <ellipse cx="300" cy="350" rx="185" ry="115" fill="#15803D" opacity="0.9"/>
      <ellipse cx="300" cy="335" rx="172" ry="105" fill="#22C55E" opacity="0.9"/>
      <ellipse cx="300" cy="318" rx="158" ry="96" fill="#4ADE80"/>
      <!-- Upper foliage -->
      <ellipse cx="300" cy="225" rx="145" ry="105" fill="#16A34A" opacity="0.95"/>
      <ellipse cx="300" cy="210" rx="135" ry="95" fill="#22C55E" opacity="0.9"/>
      <ellipse cx="300" cy="194" rx="120" ry="86" fill="#4ADE80"/>
      <!-- Top foliage -->
      <ellipse cx="300" cy="115" rx="95" ry="80" fill="#22C55E" opacity="0.95"/>
      <ellipse cx="300" cy="100" rx="85" ry="70" fill="#4ADE80" opacity="0.9"/>
      <ellipse cx="300" cy="86" rx="70" ry="58" fill="#86EFAC"/>
      <!-- Crown tip -->
      <ellipse cx="300" cy="42" rx="46" ry="40" fill="#4CD080"/>
      <ellipse cx="300" cy="30" rx="28" ry="24" fill="#A7F3D0" opacity="0.8"/>
      <!-- Highlights (light patches) -->
      <ellipse cx="240" cy="280" rx="55" ry="34" fill="#A7F3D0" opacity="0.18"/>
      <ellipse cx="238" cy="390" rx="62" ry="38" fill="#6EE7B7" opacity="0.15"/>
      <ellipse cx="245" cy="430" rx="50" ry="30" fill="#A7F3D0" opacity="0.12"/>
      <ellipse cx="246" cy="176" rx="38" ry="22" fill="#D1FAE5" opacity="0.2"/>
      <!-- Colorful fruits -->
      <circle cx="380" cy="310" r="18" fill="#F97316" opacity="0.95"/>
      <circle cx="215" cy="330" r="15" fill="#EC4899" opacity="0.9"/>
      <circle cx="415" cy="410" r="17" fill="#F59E0B" opacity="0.95"/>
      <circle cx="180" cy="425" r="13" fill="#EF4444" opacity="0.9"/>
      <circle cx="395" cy="195" r="15" fill="#F97316" opacity="0.9"/>
      <circle cx="200" cy="200" r="12" fill="#EC4899" opacity="0.9"/>
      <circle cx="360" cy="105" r="12" fill="#F59E0B" opacity="0.9"/>
      <circle cx="240" cy="95" r="10" fill="#F97316" opacity="0.85"/>
      <!-- Golden star at top -->
      <path d="M300 8 L306 22 L322 24 L311 34 L314 50 L300 42 L286 50 L289 34 L278 24 L294 22 Z" fill="#FCD34D" opacity="0.95"/>
      <!-- Sparkles -->
      <path d="M460 160 L464 170 L474 174 L464 178 L460 188 L456 178 L446 174 L456 170 Z" fill="#FCD34D" opacity="0.8"/>
      <path d="M135 200 L138 208 L146 211 L138 214 L135 222 L132 214 L124 211 L132 208 Z" fill="#A78BFA" opacity="0.7"/>
      <path d="M480 440 L483 448 L491 451 L483 454 L480 462 L477 454 L469 451 L477 448 Z" fill="#34D399" opacity="0.7"/>
      <path d="M118 370 L120 376 L126 378 L120 380 L118 386 L116 380 L110 378 L116 376 Z" fill="#F9A8D4" opacity="0.6"/>
      <!-- Floating leaves -->
      <path d="M440 280 Q450 268 462 275 Q452 287 440 280Z" fill="#4ADE80" opacity="0.6"/>
      <path d="M148 295 Q140 283 152 278 Q158 290 148 295Z" fill="#4ADE80" opacity="0.5"/>
    </svg>
  </div>

  <!-- Stats Row -->
  <div class="stats-row">
    <div class="stat-card green">
      <div class="num">48</div>
      <div class="lbl">مهمة منجزة</div>
    </div>
    <div class="stat-card orange">
      <div class="num">14</div>
      <div class="lbl">يوم متواصل</div>
    </div>
    <div class="stat-card purple">
      <div class="num">#3</div>
      <div class="lbl">في المتصدرين</div>
    </div>
  </div>

  <!-- Bottom -->
  <div class="bottom-section">
    <div class="biome-badge">
      <span>🌿 بيئة الربيع — المرحلة الذهبية</span>
    </div>
    <div class="water-btn">
      <span>💧 اسقِ شجرتك اليوم (+50 نقطة)</span>
    </div>
  </div>
</div>
</body>
</html>
